# Server Configuration
server.port=${PORT:8080}
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/css,text/javascript,application/javascript

# MongoDB Configuration
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/moviex}
spring.data.mongodb.database=moviex
spring.data.mongodb.auto-index-creation=true

# Security Auto Config is now handled manually
# spring.autoconfigure.exclude=... (Removed)

# JWT Setup
moviex.app.jwtSecret=${JWT_SECRET:mySuperSecretKeyThatNeedsToBeLongEnoughForHS256ToWorkWhichMeansAtLeast256BitsOr32Characters}
moviex.app.jwtExpirationMs=${JWT_EXPIRATION_MS:86400000}
moviex.app.frontend-base-url=${FRONTEND_BASE_URL:http://localhost:3000}
moviex.app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
app.auth.require-email-verification=${APP_AUTH_REQUIRE_EMAIL_VERIFICATION:false}
spring.devtools.livereload.enabled=false
cinema.booking.hold-minutes=${CINEMA_BOOKING_HOLD_MINUTES:10}
cinema.booking.cleanup-interval-ms=${CINEMA_BOOKING_CLEANUP_INTERVAL_MS:60000}

# Mail config
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS:true}

# MovieX sandbox QR payment configuration
moviex.payment.sandbox.frontend-base-url=${PAYMENT_SANDBOX_FRONTEND_BASE_URL:${moviex.app.frontend-base-url}}
moviex.payment.sandbox.receiver-name=JDWoBossMoviex(Thong)
moviex.payment.sandbox.receiver-account=0817724998
moviex.payment.sandbox.bank-name=Ng\u00e2n h\u00e0ng m\u00f4 ph\u1ecfng MovieX Sandbox
moviex.payment.sandbox.currency=VND
