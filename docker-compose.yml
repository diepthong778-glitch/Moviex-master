version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: moviex-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - moviex-network

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: moviex-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/moviex
    depends_on:
      - mongodb
    networks:
      - moviex-network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: moviex-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - moviex-network

volumes:
  mongodb_data:

networks:
  moviex-network:
    driver: bridge
